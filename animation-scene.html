<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="lightblue"></a-sky>

          <cylinder color="blue" height="3" 
          position="5 -2 -6"
          animation="
          property: rotation;
          from:5 -2 -3;
          to: 0 180 -90; 
          loop: true;
          dir: alternate;
          "></cylinder>"

      

        </a-scene>
    </body>
</html>
